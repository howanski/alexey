# https://github.com/compose-spec/compose-spec/blob/master/spec.md
services:
    database:
        env_file:
            - .env
        image: mysql:8.0.40
        container_name: "alexey-mysql"
        restart: ${DOCKER_RESTART_POLICY:-always}
        networks:
            - network
        volumes:
            - database_volume:/var/lib/mysql
            - ./entrails/mysql_conf:/etc/mysql/conf.d
        logging:
            driver: json-file
            options:
                max-size: "5m"
                max-file: "2"
    phpmyadmin:
        env_file:
            - .env
        image: phpmyadmin/phpmyadmin
        container_name: "alexey-phpmyadmin"
        expose:
            - 80
        networks:
            - network
        restart: ${DOCKER_RESTART_POLICY:-always}
        depends_on:
            - database
        logging:
            driver: json-file
            options:
                max-size: "5m"
                max-file: "2"
    php:
        env_file:
            - .env
        build:
            context: ./entrails/php-fpm
            dockerfile: Dockerfile
        container_name: "alexey-php"
        networks:
            - network
            - wake_lan
        depends_on:
            - database
        volumes:
            - ./../application:/var/www/html
            - ./entrails/nginx/ngrok:/ngrok
        restart: ${DOCKER_RESTART_POLICY:-always}
        logging:
            driver: json-file
            options:
                max-size: "5m"
                max-file: "2"
        extra_hosts:
            - "host.docker.internal:host-gateway"
    nginx:
        env_file:
            - .env
        build:
            context: ./entrails/nginx
            dockerfile: Dockerfile
        container_name: "alexey-nginx"
        ports:
            - 80:80
            - 443:443
        networks:
            - network
        restart: ${DOCKER_RESTART_POLICY:-always}
        depends_on:
            - php
            - database
        volumes:
            - ./../application:/var/www/html
            - ./entrails/nginx/vhosts:/etc/nginx/vhost.d
            - ./entrails/nginx/ngrok:/ngrok
            - ./entrails/nginx/supervisor:/etc/supervisor/conf.d
            - ./entrails/nginx/nginx.conf:/etc/nginx/nginx.conf
            - ./entrails/nginx/ssl:/etc/nginx/ssl
        logging:
            driver: json-file
            options:
                max-size: "5m"
                max-file: "2"
    searxng:
        container_name: "alexey-searxng"
        image: docker.io/searxng/searxng:${SEARXNG_VERSION}
        restart: ${DOCKER_RESTART_POLICY:-always}
        env_file: 
            - .env
        networks:
            - network
        volumes:
            - ./entrails/searxng/config/:/etc/searxng/:ro
        healthcheck:
            test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/', timeout=5)"] 
            interval: 60s
            timeout: 5s
            retries: 3
            start_period: 15s
        logging:
            driver: json-file
            options:
                max-size: "5m"
                max-file: "2"
    valkey:
        container_name: "alexey-valkey"
        image: docker.io/valkey/valkey:9-alpine
        command: valkey-server --save 30 1 --loglevel warning
        restart: ${DOCKER_RESTART_POLICY:-always}
        volumes:
            - valkey_data:/data/
        networks:
            - network
        healthcheck:
            test: ["CMD", "valkey-cli", "ping"]
            interval: 60s
            timeout: 3s
            retries: 3
            start_period: 5s
        logging:
            driver: json-file
            options:
                max-size: "5m"
                max-file: "2"
volumes:
    database_volume: {}
    valkey_data: {}

networks:
    network:
    wake_lan:
        driver: macvlan
        driver_opts:
            parent: ${WAKE_LAN_INTERFACE} #required value in docker/.env, i.e. eth0
        ipam:
            driver: default
            config:
                - subnet: ${WAKE_LAN_SUBNET} #required value in docker/.env, i.e. 192.168.1.0/24
                  gateway: ${WAKE_LAN_GATEWAY} #required value in docker/.env, i.e. 192.168.1.1 <- pointing to your router
                  ip_range: ${WAKE_LAN_RESERVED_IPS} #required value in docker/.env, i.e. 192.168.1.240/29 <- tiny slice of network WITHOUT your router
